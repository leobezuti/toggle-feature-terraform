apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: analytics-service
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/leobezuti/toggle-feature-terraform
    path: GitOps/analytics-service
    targetRevision: HEAD
  destination:
    server: https://kubernetes.default.svc
    namespace: analytics-service
  syncPolicy:
    automated:
      prune: true
      selfHeal: true