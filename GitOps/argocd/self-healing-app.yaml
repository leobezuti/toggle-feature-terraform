apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: self-healing
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/leobezuti/toggle-feature-terraform
    path: GitOps/monitoring/self-healing
    targetRevision: HEAD
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
