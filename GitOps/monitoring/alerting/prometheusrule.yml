apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: togglemaster-alerts
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
    app: kube-prometheus-stack
spec:
  groups:
    - name: togglemaster.services
      interval: 1m
      rules:
        - alert: ServiceHighErrorRate
          expr: |
            sum by (namespace) (
              rate(kube_pod_container_status_restarts_total{
                namespace=~"auth-service|flag-service|evaluation-service|targeting-service|analytics-service"
              }[5m])
            ) > 0.1
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Alta taxa de reinicializações no {{ $labels.namespace }}"
            description: "O serviço {{ $labels.namespace }} está reiniciando com frequência anormal. Taxa: {{ $value | printf \"%.2f\" }}/s. Possível falha silenciosa detectada."

        - alert: ServicePodNotRunning
          expr: |
            sum by (namespace, pod) (
              kube_pod_status_phase{
                phase!="Running",
                namespace=~"auth-service|flag-service|evaluation-service|targeting-service|analytics-service"
              }
            ) > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.pod }} não está Running em {{ $labels.namespace }}"
            description: "O pod {{ $labels.pod }} no namespace {{ $labels.namespace }} não está no estado Running há mais de 5 minutos."

        - alert: HighCPUUsage
          expr: |
            100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Alto uso de CPU no nó {{ $labels.instance }}"
            description: "O nó {{ $labels.instance }} está com CPU acima de 85% por mais de 5 minutos."

        - alert: HighMemoryUsage
          expr: |
            (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Alto uso de memória no nó {{ $labels.instance }}"
            description: "O nó {{ $labels.instance }} está com memória acima de 85%."
