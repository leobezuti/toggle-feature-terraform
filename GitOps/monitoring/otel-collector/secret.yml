apiVersion: v1
kind: Secret
metadata:
  name: otel-collector-secrets
  namespace: monitoring
type: Opaque
# Populate with: kubectl create secret generic otel-collector-secrets \
#   --from-literal=NEW_RELIC_LICENSE_KEY=<your-key> \
#   -n monitoring --dry-run=client -o yaml
# Or set via external-secrets / sealed-secrets.
stringData:
  NEW_RELIC_LICENSE_KEY: "REPLACE_WITH_ACTUAL_KEY"
