apiVersion: v1
kind: ConfigMap
metadata:
  name: togglemaster-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  togglemaster-overview.json: |
    {
      "annotations": { "list": [] },
      "description": "ToggleMaster - Saúde do Ecossistema",
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "id": 1,
          "title": "Cluster - Uso de Recursos",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 70 },
                  { "color": "red", "value": 90 }
                ]
              },
              "unit": "percent"
            }
          },
          "gridPos": { "h": 8, "w": 6, "x": 0, "y": 1 },
          "id": 2,
          "options": {
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "showThresholdLabels": false,
            "showThresholdMarkers": true
          },
          "title": "CPU Usage (Cluster %)",
          "type": "gauge",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "100 - (avg(rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) * 100)",
              "legendFormat": "CPU %",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 70 },
                  { "color": "red", "value": 90 }
                ]
              },
              "unit": "percent"
            }
          },
          "gridPos": { "h": 8, "w": 6, "x": 6, "y": 1 },
          "id": 3,
          "options": {
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "showThresholdLabels": false,
            "showThresholdMarkers": true
          },
          "title": "Memory Usage (Cluster %)",
          "type": "gauge",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "(1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100",
              "legendFormat": "Memory %",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "color": { "mode": "palette-classic" }, "unit": "short" }
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 1 },
          "id": 4,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" } },
          "title": "Pods Running por Namespace",
          "type": "timeseries",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum by (namespace) (kube_pod_status_phase{phase=\"Running\"})",
              "legendFormat": "{{ namespace }}",
              "refId": "A"
            }
          ]
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 9 },
          "id": 5,
          "title": "Microsserviços - Taxa de Requisições",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "color": { "mode": "palette-classic" }, "unit": "reqps" }
          },
          "gridPos": { "h": 9, "w": 12, "x": 0, "y": 10 },
          "id": 6,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" } },
          "title": "HTTP Request Rate por Serviço",
          "type": "timeseries",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum by (job) (rate(http_server_duration_milliseconds_count[5m]))",
              "legendFormat": "{{ job }}",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "color": { "mode": "palette-classic" }, "unit": "percent" }
          },
          "gridPos": { "h": 9, "w": 12, "x": 12, "y": 10 },
          "id": 7,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" } },
          "title": "Taxa de Erros HTTP 5xx (%)",
          "type": "timeseries",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "100 * sum by (namespace) (rate(kube_pod_container_status_restarts_total[5m])) / sum by (namespace) (kube_pod_info)",
              "legendFormat": "{{ namespace }}",
              "refId": "A"
            }
          ]
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 19 },
          "id": 8,
          "title": "Logs em Tempo Real",
          "type": "row"
        },
        {
          "datasource": { "type": "loki", "uid": "loki" },
          "gridPos": { "h": 12, "w": 24, "x": 0, "y": 20 },
          "id": 9,
          "options": {
            "dedupStrategy": "none",
            "enableLogDetails": true,
            "prettifyLogMessage": false,
            "showCommonLabels": false,
            "showLabels": false,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": false
          },
          "title": "Logs - Todos os Serviços ToggleMaster",
          "type": "logs",
          "targets": [
            {
              "datasource": { "type": "loki", "uid": "loki" },
              "expr": "{namespace=~\"flag-service|auth-service|evaluation-service|targeting-service|analytics-service\"}",
              "legendFormat": "",
              "refId": "A"
            }
          ]
        }
      ],
      "refresh": "30s",
      "schemaVersion": 38,
      "tags": ["togglemaster", "overview"],
      "time": { "from": "now-1h", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "title": "ToggleMaster - Visão Geral",
      "uid": "togglemaster-overview",
      "version": 1
    }
