apiVersion: v1
kind: ConfigMap
metadata:
  name: self-healing-script
  namespace: monitoring
data:
  server.py: |
    import json
    import logging
    import os
    from datetime import datetime, timezone
    from http.server import BaseHTTPRequestHandler, HTTPServer

    from kubernetes import client, config

    logging.basicConfig(level=logging.INFO, format="%(asctime)s %(levelname)s %(message)s")
    log = logging.getLogger(__name__)

    try:
        config.load_incluster_config()
        log.info("Using in-cluster Kubernetes config")
    except Exception:
        config.load_kube_config()
        log.info("Using local kubeconfig")

    apps_v1 = client.AppsV1Api()


    def rollout_restart(namespace: str, deployment: str):
        now = datetime.now(tz=timezone.utc).isoformat()
        patch = {
            "spec": {
                "template": {
                    "metadata": {
                        "annotations": {
                            "kubectl.kubernetes.io/restartedAt": now
                        }
                    }
                }
            }
        }
        apps_v1.patch_namespaced_deployment(name=deployment, namespace=namespace, body=patch)
        log.info(f"Rollout restart triggered: {namespace}/{deployment}")


    class AlertHandler(BaseHTTPRequestHandler):
        def log_message(self, fmt, *args):  # silence default access log
            pass

        def do_POST(self):
            length = int(self.headers.get("Content-Length", 0))
            raw = self.rfile.read(length) if length else b"{}"
            try:
                payload = json.loads(raw)
            except json.JSONDecodeError:
                payload = {}

            alerts = payload.get("alerts", [])
            for alert in alerts:
                if alert.get("status") != "firing":
                    continue
                labels = alert.get("labels", {})
                namespace = labels.get("namespace", "")
                service = labels.get("service", labels.get("namespace", ""))
                if not namespace or not service:
                    log.warning(f"Alert missing namespace/service labels: {labels}")
                    continue
                try:
                    rollout_restart(namespace, service)
                except Exception as exc:
                    log.error(f"Failed to restart {namespace}/{service}: {exc}")

            self.send_response(200)
            self.send_header("Content-Type", "application/json")
            self.end_headers()
            self.wfile.write(b'{"status":"ok"}')


    if __name__ == "__main__":
        port = int(os.getenv("PORT", "9000"))
        log.info(f"Self-healing controller listening on :{port}")
        HTTPServer(("0.0.0.0", port), AlertHandler).serve_forever()
