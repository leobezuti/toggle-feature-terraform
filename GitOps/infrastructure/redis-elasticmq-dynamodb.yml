# Redis
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: infrastructure
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7
          ports:
            - containerPort: 6379
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: infrastructure
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
---
# ElasticMQ (SQS local)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: elasticmq
  namespace: infrastructure
spec:
  replicas: 1
  selector:
    matchLabels:
      app: elasticmq
  template:
    metadata:
      labels:
        app: elasticmq
    spec:
      containers:
        - name: elasticmq
          image: softwaremill/elasticmq
          ports:
            - containerPort: 9324
---
apiVersion: v1
kind: Service
metadata:
  name: elasticmq
  namespace: infrastructure
spec:
  selector:
    app: elasticmq
  ports:
    - port: 9324
      targetPort: 9324
---
# DynamoDB Local
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dynamodb-local
  namespace: infrastructure
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dynamodb-local
  template:
    metadata:
      labels:
        app: dynamodb-local
    spec:
      containers:
        - name: dynamodb-local
          image: amazon/dynamodb-local
          command: ["java", "-jar", "DynamoDBLocal.jar", "-sharedDb"]
          ports:
            - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: dynamodb-local
  namespace: infrastructure
spec:
  selector:
    app: dynamodb-local
  ports:
    - port: 8000
      targetPort: 8000
