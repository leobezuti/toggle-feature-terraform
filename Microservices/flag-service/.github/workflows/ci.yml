name: CI/CD Pipeline for Flag Service

on:
  push:
    branches: [ main ]
    paths:
      - 'Microservices/flag-service/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'Microservices/flag-service/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Cache pip
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r Microservices/flag-service/requirements.txt

    - name: Run tests
      run: python -m pytest

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install linting tools
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pylint

    - name: Run flake8
      run: flake8 Microservices/flag-service --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Run pylint
      run: pylint Microservices/flag-service/app.py --disable=C,R

  security-scan:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install -r Microservices/flag-service/requirements.txt

    - name: Run Bandit Security Scanner
      run: |
        pip install bandit
        bandit -r Microservices/flag-service/ -f json -o bandit-report.json || true

    - name: Run Trivy filesystem scan
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: 'Microservices/flag-service'
        severity: 'CRITICAL'
        exit-code: '1'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v2
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

  docker-build-push:
    runs-on: ubuntu-latest
    needs: [build-and-test, lint, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ steps.login-ecr.outputs.registry }}/flag-service
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./Microservices/flag-service
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Scan Docker image
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'image'
        scan-ref: '${{ steps.login-ecr.outputs.registry }}/flag-service:${{ github.sha }}'
        severity: 'CRITICAL'
        exit-code: '1'
        format: 'sarif'
        output: 'trivy-image-results.sarif'

    - name: Upload Trivy image scan results
      uses: github/codeql-action/upload-sarif@v2
      if: always()
      with:
        sarif_file: 'trivy-image-results.sarif'

    - name: Update GitOps repo
      env:
        SERVICE_NAME: flag-service
      run: |
        sed -i "s|image: .*/${SERVICE_NAME}:.*|image: ${{ steps.login-ecr.outputs.registry }}/${SERVICE_NAME}:${{ github.sha }}|" GitOps/${SERVICE_NAME}/deployment.yml
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add GitOps/${SERVICE_NAME}/deployment.yml
        git commit -m "Update image tag for ${SERVICE_NAME} to ${{ github.sha }}" || echo "No changes to commit"
        git push
